<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Level Inheritance</title>
</head>
<body>
    <script>
        class A{
            display1(){
                console.log("A Is Calling...");
            }
        }

        class B extends A{
            display2(){
                console.log("B Is Calling...");
            }
        }

        class C extends B{
            display3(){
                console.log("C Is Calling...");
            }
        }

        const obj = new C();
        obj.display1();
        obj.display2();
        obj.display3();
    </script>
</body>
</html>
