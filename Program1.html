<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Program</title>
</head>
<body>
    <script>
        class Student{
            constructor(name,age){
                this.name = name;
                this.age = age;
            }

            display(){
                console.log(this.name);
                console.log(this.age);
            }
        }

        const s1 = new Student("Devanshi",22);
        s1.display();
    </script>
</body>
</html>
