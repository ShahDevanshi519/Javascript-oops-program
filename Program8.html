<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Method Overriding</title>
</head>
<body>
    <script>
        class A{
            display(){
                console.log("Class A Called");
            }
        }

        class B extends A{
            display(){
                // super.display();
                console.log("Class B Called");
            }
        }

        const obj = new B();
        obj.display();
    </script>
</body>
</html>
